<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komputery</title>
    <link rel="stylesheet" href="styl.css">
    <script>
        function wyswietl() {
            var name = document.getElementById('imie').value;
            var surname = document.getElementById('nazwisko').value;
            var email = document.getElementById('email').value.toLowerCase();
            var wybor = document.getElementById('wybor').value;


            var haer = document.createElement("hr");
            second.append(haer);

            var wynik = document.createElement('p');
            wynik.innerHTML = name + " " + surname + "<br>" + email + "<br>" + "Usługi: " + wybor;
            second.append(wynik);

        }
    </script>
</head>

<body>
    <main>
        <header>
            <img src="animacja.gif" alt="Pogotowie komputerowe">
        </header>
        <menu>
            <a href="index.html">Strona Główna</a>
            <a href="kontakt.html">Kontakt</a>
        </menu>
        <section id="first">
        </section>
        <section id="second">
            <h2>Kontakt</h2>
            <table>
                <tr>
                    <td>Imię:</td>
                    <td><input type="text" id="imie"></td>
                </tr>
                <tr>
                    <td>Nazwisko</td>
                    <td><input type="text" id="nazwisko"></td>
                </tr>
                <tr>
                    <td>E-mail</td>
                    <td><input type="email" id="email"></td>
                </tr>
                <tr>
                    <td>Zgłoszenie:</td>
                    <td>
                        <select name="wybor" id="wybor">
                            <option value="naprawa komputerów">naprawa komputerów</option>
                            <option value="odzyskiwanie danych">odzyskiwanie danych</option>
                            <option value="wirusy">wirusy</option>
                            <option value="konfiguracja LAN">konfiguracja LAN</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td><input type="checkbox" checked>Wyślij kopię wiadomości</td>
                </tr>
                <tr>
                    <td></td>
                    <td><button type="reset">Czyść</button><button type="submit" onclick="wyswietl()">Wyślij</button>
                    </td>
                </tr>
            </table>
        </section>
        <section id="third">

        </section>
        <footer>Autor: <i>numer zdajacego</i></footer>
    </main>
</body>

</html>
