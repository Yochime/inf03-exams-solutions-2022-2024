<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chat</title>
    <link rel="stylesheet" href="styl.css">
</head>

<body>
    <header>
        <h2>Chat</h2>
    </header>
    <aside>
        <h3>Chaty</h3>
        <ul>
            <li>Ogólny</li>
            <li>Tematyczne
                <ol>
                    <li>Turystyczny</li>
                    <li>Zeglarski</li>
                    <li>Filatelistyczny</li>
                    <li>Hodowla zwierzątek domowych</li>
                </ol>
            </li>
        </ul>
        <h3>Uczestnicy</h3>
        <p>Jolanta Nowak</p>
        <img src="Jolka.jpg" alt="Jolanta Nowak">
        <p>Krzysztof Łukasiński</p>
        <img src="Krzysiek.jpg" alt="Krzysztof Łukasiński">
    </aside>
    <main>
        <section id="chat">
            <section class="jola">
                <img src="Jolka.jpg" alt="">
                <p>Cześć idziesz jutro do kina?</p>
            </section>
            <section class="krzys">
                <p>Tak! A ty?</p>
                <img src="Krzysiek.jpg" alt="">
            </section>
        </section>
        <label for="wiadomosc">Wpisz wiadomość</label>
        <input type="text" name="wiadomosc" id="wiadomosc">
        <button onclick="wyslij()">Wyślij</button>
        <br>
        <button onclick="odp()">Generuj losową odpowiedź</button>
    </main>
    <footer>
        <h5>Chat wykonał</h5>
    </footer>
    <script>
        function wyslij() {
            var wiadomosc = document.getElementById('wiadomosc').value;
            var zdjKrzys = document.createElement('img');
            var chat = document.getElementById('chat');
            var nowaSekcja = document.createElement('section');
            var nowyP = document.createElement('p');

            zdjKrzys.src = 'Krzysiek.jpg';

            nowyP.innerHTML = wiadomosc;
            nowaSekcja.append(nowyP);
            nowaSekcja.append(zdjKrzys);
            chat.append(nowaSekcja);
            nowaSekcja.classList.add('krzys');
            nowaSekcja.scrollIntoView();
        }
        function odp() {
            var odpowiedz = [
                "Świetnie!",
                "Kto gra główną rolę?",
                "Lubisz filmy Tego reżysera?",
                "Będę 10 minut wcześniej",
                "Może kupimy sobie popcorn?",
                "Ja wolę Colę",
                "Zaproszę jeszcze Grześka",
                "Tydzień temu też byłem w kinie na Diunie",
                "Ja funduję bilety"
            ];
            var liczba = Math.floor(Math.random() * 9);

            var zdjJola = document.createElement('img');
            var chat = document.getElementById('chat');
            var nowaSekcja = document.createElement('section');
            var nowyP = document.createElement('p');

            zdjJola.src = 'Jolka.jpg';

            nowyP.innerHTML = odpowiedz[liczba];
            nowaSekcja.append(zdjJola);
            nowaSekcja.append(nowyP);
            chat.append(nowaSekcja);
            nowaSekcja.classList.add('jola');
            nowaSekcja.scrollIntoView();
        }
    </script>
</body>

</html>
